# =============================================================================,
# Inventaire Ansible - Environnement PROD,
# =============================================================================,
all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/tp_filrouge
    ansible_ssh_common_args: '-o ProxyJump=proxmox-tp -o StrictHostKeyChecking=no'
    ansible_python_interpreter: /usr/bin/python3

  children:
    database:
      hosts:
        prod-wiki-db:
          ansible_host: 10.0.30.201

    app:
      hosts:
        prod-wiki-app:
          ansible_host: 10.0.30.202

    prod:
      children:
        database:
        app:
