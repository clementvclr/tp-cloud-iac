# =============================================================================
# Inventaire Ansible - Environnement DEV
# =============================================================================

all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/tp_filrouge
    ansible_ssh_common_args: '-o ProxyJump=proxmox-tp -o StrictHostKeyChecking=no'
    ansible_python_interpreter: /usr/bin/python3

  children:
    database:
      hosts:
        dev-wiki-db:
          ansible_host: 10.0.30.211

    app:
      hosts:
        dev-wiki-app:
          ansible_host: 10.0.30.212

    dev:
      children:
        database:
        app: 
