# =============================================================================
# Role wikijs - installation et configuration de Wiki.js
# =============================================================================

- name: Installer les dependances systeme
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - tar
    state: present
    update_cache: true
  become: true

- name: Ajouter la cle GPG du depot NodeSource
  ansible.builtin.shell: |
    curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
  args:
    creates: /usr/share/keyrings/nodesource.gpg
  become: true

- name: Ajouter le depot NodeSource
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_version }}.x nodistro main"
    filename: nodesource
    state: present
  become: true

- name: Installer Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
  become: true

- name: Creer l'utilisateur systeme wikijs
  ansible.builtin.user:
    name: "{{ wikijs_user }}"
    system: true
    home: "{{ wikijs_install_dir }}"
    shell: /bin/bash
    create_home: true
  become: true

- name: Telecharger Wiki.js
  ansible.builtin.get_url:
    url: "https://github.com/Requarks/wiki/releases/latest/download/wiki-js.tar.gz"
    dest: /tmp/wiki-js.tar.gz
    mode: '0644'
    force: false
  become: true

- name: Extraire Wiki.js
  ansible.builtin.unarchive:
    src: /tmp/wiki-js.tar.gz
    dest: "{{ wikijs_install_dir }}"
    remote_src: true
    owner: "{{ wikijs_user }}"
    group: "{{ wikijs_user }}"
    creates: "{{ wikijs_install_dir }}/server.js"
  become: true

- name: Generer le fichier de configuration Wiki.js
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ wikijs_install_dir }}/config.yml"
    owner: "{{ wikijs_user }}"
    group: "{{ wikijs_user }}"
    mode: '0640'
  become: true
  notify: Redemarrer wikijs

- name: Installer le service systemd Wiki.js
  ansible.builtin.template:
    src: wikijs.service.j2
    dest: /etc/systemd/system/wikijs.service
    owner: root
    group: root
    mode: '0644'
  become: true
  notify:
    - Recharger systemd
    - Redemarrer wikijs

- name: Activer et demarrer Wiki.js
  ansible.builtin.systemd:
    name: wikijs
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Ouvrir le port Wiki.js dans UFW
  community.general.ufw:
    rule: allow
    port: "{{ wikijs_port }}"
    proto: tcp
  become: true
